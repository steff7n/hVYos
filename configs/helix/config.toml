# Linta Linux — Default Helix editor configuration
# Profiles: [All]
# Spec: README.md §8.2

theme = "onedark"

[editor]
line-number = "relative"
cursorline = true
auto-save = true
rulers = [80, 120]
color-modes = true
bufferline = "multiple"
true-color = true
undercurl = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true
character = "│"

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = ["diagnostics"]
right = ["selections", "position", "file-encoding", "file-line-ending", "file-type"]

[editor.whitespace.render]
tab = "all"
newline = "none"

[editor.soft-wrap]
enable = true

[keys.normal]
C-s = ":w"
C-q = ":q"
